name: Autonomous Content Factory

on:
  # 定时触发：每天 UTC 时间 00:00（北京时间 08:00）运行
  schedule:
    - cron: '0 0 * * *'
  
  # 手动触发（用于测试）
  workflow_dispatch:
    inputs:
      run_reason:
        description: '运行原因'
        required: false
        default: 'Manual trigger'

  # 当 main 分支有更新时触发（可选）
  push:
    branches: [main]
    paths:
      - '.codebuddy/agents/**'
      - '.github/workflows/autonomous-content-factory.yml'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPO: ${{ github.repository }}

jobs:
  run-autonomous-factory:
    name: Run Autonomous Content Factory
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 获取完整历史记录

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装 Agent 系统依赖
          cd .codebuddy/agents
          pip install -r requirements.txt || pip install requests

      # 4. 运行自主内容工厂
      - name: Run Autonomous Content Factory
        id: factory
        run: |
          cd .codebuddy/agents
          
          # 设置环境变量
          export GITHUB_TOKEN="${{ secrets.GH_PAT }}"
          export GITHUB_REPO="${{ github.repository }}"
          
          # 运行自主内容工厂
          python3 run_autonomous_factory.py 2>&1 | tee factory_output.log
          
          # 检查是否成功
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Autonomous Content Factory completed successfully"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Autonomous Content Factory failed"
            exit 1
          fi
        continue-on-error: true

      # 5. 上传日志
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factory-logs-${{ github.run_number }}
          path: |
            .codebuddy/logs/content_factory.log
            .codebuddy/agents/factory_output.log
          retention-days: 30

      # 6. 创建 Issue（如果失败）
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Autonomous Content Factory Failed - Run #${context.runNumber}`,
              body: `
              ## 运行信息
              
              - **触发方式**: ${{ github.event_name }}
              - **运行编号**: ${{ github.run_number }}
              - **运行时间**: ${{ github.event.head_commit.timestamp }}
              - **提交**: ${{ github.sha }}
              
              ## 错误信息
              
              自主内容工厂运行失败，请检查日志：
              
              [查看运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              
              ## 附件
              
              日志已上传为 Artifacts，请下载查看详情。
              `,
              labels: ['bug', 'autonomous-factory']
            });

      # 7. 发送通知（可选）
      - name: Send notification
        if: always()
        run: |
          if [ "${{ steps.factory.outputs.status }}" == "success" ]; then
            echo "✅ 自主内容工厂运行成功"
          else
            echo "❌ 自主内容工厂运行失败"
          fi

  # 自动合并审核通过的 PR（可选）
  auto-merge-approved-prs:
    name: Auto-merge Approved PRs
    runs-on: ubuntu-latest
    needs: run-autonomous-factory
    if: github.event_name == 'schedule'  # 仅定时触发时自动合并
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and merge approved PRs
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // 查找最近的 PR
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 10
            });
            
            let mergedCount = 0;
            
            for (const pull of pulls.data) {
              // 检查 PR 标签
              const labels = pull.labels.map(l => l.name);
              
              // 如果有 "auto-merge" 标签，自动合并
              if (labels.includes('auto-merge')) {
                try {
                  await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number: pull.number,
                    commit_title: `Auto-merge PR #${pull.number}`,
                    merge_method: 'merge'
                  });
                  
                  console.log(`✅ Auto-merged PR #${pull.number}: ${pull.title}`);
                  mergedCount++;
                } catch (error) {
                  console.log(`❌ Failed to merge PR #${pull.number}: ${error.message}`);
                }
              }
            }
            
            console.log(`\n📊 Summary: ${mergedCount} PR(s) auto-merged`);

  # 清理旧分支（可选）
  cleanup-old-branches:
    name: Cleanup Old Merged Branches
    runs-on: ubuntu-latest
    needs: run-autonomous-factory
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cleanup old content branches
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // 查找所有分支
            const branches = await github.rest.repos.listBranches({
              owner,
              repo,
              per_page: 100
            });
            
            let deletedCount = 0;
            const retentionDays = 30;
            
            for (const branch of branches.data) {
              const branchName = branch.name;
              
              // 只清理 "content/" 开头的分支
              if (branchName.startsWith('content/')) {
                try {
                  // 获取分支的最后提交时间
                  const branchInfo = await github.rest.repos.getBranch({
                    owner,
                    repo,
                    branch: branchName
                  });
                  
                  const lastCommitDate = new Date(branchInfo.data.commit.commit.committer.date);
                  const daysSinceLastCommit = (Date.now() - lastCommitDate.getTime()) / (1000 * 60 * 60 * 24);
                  
                  // 如果分支超过保留天数，删除它
                  if (daysSinceLastCommit > retentionDays) {
                    await github.rest.git.deleteRef({
                      owner,
                      repo,
                      ref: `heads/${branchName}`
                    });
                    
                    console.log(`🗑️ Deleted old branch: ${branchName} (${Math.floor(daysSinceLastCommit)} days old)`);
                    deletedCount++;
                  }
                } catch (error) {
                  console.log(`⚠️ Failed to process branch ${branchName}: ${error.message}`);
                }
              }
            }
            
            console.log(`\n📊 Summary: ${deletedCount} old branch(es) deleted`);
